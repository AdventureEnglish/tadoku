<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4faa5a">
<title>多読クラブ 語数チェッカー｜Adventure English</title>
<style>
  :root{
    --green:#4faa5a; --green-d:#357a44;
    --teal:#2d83a6; --teal-d:#1f6383;
    --yellow:#f4b740; --orange:#ef9f2c; --orange-d:#d4851b;
    --pink:#ea93b4;
    --sand:#fdf5e6; --card:#fffdf8;
    --ink:#33453b; --muted:#8a9389; --line:#ecdfc6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
    background:var(--sand); color:var(--ink); line-height:1.55;}
  .sprite{position:absolute;width:0;height:0;overflow:hidden}

  /* ---- hero / brand ---- */
  .hero{position:relative; overflow:hidden; padding:16px 16px 30px; text-align:center;
    background:linear-gradient(180deg,#fffaf0 0%,#fdeecf 100%);}
  .hero-deco{position:absolute; inset:0; pointer-events:none; opacity:.14; z-index:0}
  .hero-deco svg{position:absolute; width:46px; height:46px}
  .hero-deco .d1{top:14px; left:-6px; transform:rotate(-12deg)}
  .hero-deco .d2{top:10px; right:-4px; transform:rotate(14deg)}
  .hero-deco .d3{bottom:26px; left:10px; width:38px; transform:rotate(8deg)}
  .hero-deco .d4{bottom:24px; right:8px; width:40px; transform:rotate(-10deg)}
  .hero-wave{position:absolute; left:0; right:0; bottom:-1px; width:100%; height:22px; display:block; z-index:1}
  .brand{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:8px}
  .brand-logo{max-width:250px; width:74%; height:auto; display:block}
  .brand-fallback{display:none; align-items:center; justify-content:center;
    font-size:26px; font-weight:800; letter-spacing:.005em; color:var(--green)}
  .club{display:inline-block; color:var(--teal-d); font-weight:800; font-size:13px; letter-spacing:.18em}
  .apptitle{position:relative; z-index:2; margin:13px 0 0; font-size:20px; font-weight:800; color:var(--ink)}
  .goal{position:relative; z-index:2; display:inline-block; margin-top:8px;
    color:var(--orange-d); font-weight:800; font-size:12.5px; letter-spacing:.03em}
  .subtitle{position:relative; z-index:2; color:var(--muted); font-size:12px; margin-top:8px}

  .wrap{max-width:560px; margin:0 auto; padding:18px 16px 8px}

  /* ---- main actions ---- */
  .photo-btn{display:flex; align-items:center; justify-content:center; gap:12px;
    width:100%; padding:20px; font-size:20px; font-weight:800; color:#fff;
    background:linear-gradient(180deg,var(--yellow),var(--orange)); border:none; border-radius:18px; cursor:pointer;
    box-shadow:0 5px 0 var(--orange-d), 0 8px 16px rgba(212,133,27,.3); text-shadow:0 1px 1px rgba(0,0,0,.12)}
  .photo-btn:active{transform:translateY(3px); box-shadow:0 2px 0 var(--orange-d), 0 4px 10px rgba(212,133,27,.25)}
  .photo-btn svg{width:30px; height:30px; flex-shrink:0}
  .hint{font-size:12px; color:var(--muted); text-align:center; margin:11px 4px 20px}
  .searchbox{position:relative; margin-bottom:16px}
  .searchbox input{width:100%; padding:14px 14px 14px 46px; font-size:16px;
    border:2.5px solid var(--line); border-radius:14px; background:var(--card); outline:none; color:var(--ink)}
  .searchbox input:focus{border-color:var(--teal)}
  .searchbox .ico{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:22px; height:22px; opacity:.85}
  #status{display:none; background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:16px; margin-bottom:14px; text-align:center; font-size:14px; color:var(--teal-d); font-weight:700}
  #status.show{display:block}
  .bar{height:9px; background:#eee3cc; border-radius:99px; overflow:hidden; margin-top:12px}
  .bar > i{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--teal),var(--green)); transition:width .2s}
  .ocr-read{font-size:13px; color:var(--muted); background:#fff8e9; border:1px solid var(--line); border-radius:10px;
    padding:9px 12px; margin-bottom:14px; word-break:break-word}
  .ocr-read b{color:var(--ink)}
  .section-label{font-size:14px; color:var(--teal-d); margin:4px 2px 12px; font-weight:800}
  /* ---- result cards ---- */
  .card{display:flex; align-items:center; gap:12px; background:var(--card);
    border:2px solid var(--line); border-radius:16px; padding:14px; margin-bottom:11px;
    cursor:pointer; transition:box-shadow .15s, transform .05s, border-color .15s}
  .card:active{transform:scale(.99)}
  .card.best{border-color:var(--orange); box-shadow:0 4px 14px rgba(239,159,44,.22); background:#fffdf2}
  .card.best::before{content:"これかな?"; position:absolute; margin-top:-26px; margin-left:-2px;
    background:var(--orange); color:#fff; font-size:10px; font-weight:800; padding:2px 8px; border-radius:99px}
  .card{position:relative}
  .card .main{flex:1; min-width:0}
  .card .title{font-size:16px; font-weight:800; line-height:1.3; color:var(--ink)}
  .card .meta{font-size:12px; color:var(--muted); margin-top:4px}
  .lvl{display:inline-block; background:#eaf5ee; color:var(--green-d); font-weight:800;
    font-size:11px; padding:2px 9px; border-radius:99px; margin-right:6px}
  .words{flex-shrink:0; text-align:center; min-width:82px;
    background:linear-gradient(180deg,var(--teal),var(--teal-d)); color:#fff; border-radius:13px; padding:9px 6px;
    box-shadow:0 2px 0 rgba(0,0,0,.08)}
  .words .n{font-size:23px; font-weight:800; line-height:1}
  .words .u{font-size:10px; opacity:.92; letter-spacing:.04em; margin-top:2px}
  .empty{text-align:center; color:var(--muted); font-size:14px; padding:26px 10px}
  /* ---- detail popup ---- */
  .detail{position:fixed; inset:0; background:rgba(40,30,10,.5); display:none;
    align-items:center; justify-content:center; padding:20px; z-index:50}
  .detail.show{display:flex}
  .detail .box{position:relative; background:var(--card); border-radius:22px; padding:26px 24px;
    text-align:center; max-width:340px; width:100%; border:3px solid var(--yellow);
    box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .detail .badge{width:54px; height:54px; margin:-46px auto 8px; display:block}
  .detail .dt{font-size:20px; font-weight:800; margin-bottom:16px; color:var(--ink)}
  .detail .big{font-size:56px; font-weight:800; color:var(--teal); line-height:1}
  .detail .big small{font-size:18px; color:var(--muted); font-weight:800; margin-left:4px}
  .detail .lv2{margin-top:12px; font-size:15px; color:var(--green-d); font-weight:700}
  .detail button{margin-top:22px; width:100%; padding:14px; font-size:16px; font-weight:800;
    border:none; border-radius:14px; background:linear-gradient(180deg,var(--green),var(--green-d)); color:#fff; cursor:pointer;
    box-shadow:0 3px 0 #2c6638}
  .detail button:active{transform:translateY(2px); box-shadow:0 1px 0 #2c6638}
  footer{text-align:center; font-size:11px; color:var(--muted); padding:20px 16px 28px; line-height:1.7}
  footer .fbrand{font-weight:800; color:var(--green-d)}
  footer svg{width:18px;height:18px;vertical-align:-4px;opacity:.8;margin:0 2px}
  canvas{display:none}
</style>
</head>

<canvas id="canvas"></canvas>
<script src="books.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const BOOKS = window.BOOKS || [];
document.getElementById('bookCount').textContent = BOOKS.length.toLocaleString();

// ---- normalization & precompute ----
function norm(s){
  return (s||'').toLowerCase()
    .replace(/[''`]/g,"'")
    .replace(/[^a-z0-9' ]+/g,' ')
    .replace(/\s+/g,' ').trim();
}
const STOP = new Set(['the','a','an','of','and','to','in','for','on','is','it','at','with','my','his','her','this','that']);
function tokens(s){ return norm(s).split(' ').filter(w=>w.length>0); }
function bigrams(s){
  s=norm(s).replace(/ /g,'');
  const g=new Set(); for(let i=0;i<s.length-1;i++) g.add(s.slice(i,i+2));
  return g;
}
function sig(toks){ return toks.filter(w=>!STOP.has(w) && w.length>=2); }
BOOKS.forEach((b,i)=>{ b.id=i; b._n=norm(b.t); b._tok=tokens(b.t); b._sig=sig(b._tok); b._tset=new Set(b._tok); b._bg=bigrams(b.t); });

function diceSim(aSet,bSet){
  if(aSet.size===0||bSet.size===0) return 0;
  let inter=0; for(const x of aSet) if(bSet.has(x)) inter++;
  return (2*inter)/(aSet.size+bSet.size);
}

// Score a book against a query. Returns [score, hard] where `hard` means a real
// word/substring overlap (not just fuzzy letter-pair similarity).
function scoreBook(b, qNorm, qTok, qBg, qHas, qSig){
  if(!qNorm) return [0,false];
  if(b._n===qNorm) return [5,true];
  let s=0, hard=false;
  // (1) title coverage: how many of the title's meaningful words appear in the query
  if(b._sig.length){
    let cov=0; for(const w of b._sig) if(qHas.has(w)) cov++;
    if(cov>0) hard=true;
    s += (cov/b._sig.length)*1.4;
  }
  // (2) query precision: how many meaningful query words land in the title (lightly weighted; OCR has noise)
  if(qSig.length){
    let qh=0; for(const w of qSig) if(b._tset.has(w)) qh++;
    if(qh>0) hard=true;
    s += (qh/qSig.length)*0.4;
  }
  // (3) whole title contained inside the (noisy) query text — strong signal from OCR
  if(b._n.length>=4 && qNorm.includes(b._n)){ s += 1.2 + Math.min(b._n.length/40,0.6); hard=true; }
  // (4) query contained inside title — partial typed search (e.g. "zoo" -> "Zookeeper")
  if(qNorm.length>=2 && b._n.includes(qNorm)){ s += 1.0 + Math.min(qNorm.length/b._n.length,1)*0.5; hard=true; }
  // (5) character-bigram similarity — tolerant of misspellings / OCR slips
  s += diceSim(qBg, b._bg)*0.5;
  return [s,hard];
}

// mode: 'search' = only real (hard) matches; 'ocr' = also keep fuzzy matches for typos.
function rank(query, limit, mode){
  const qNorm=norm(query), qTok=tokens(query), qBg=bigrams(query);
  const qHas=new Set(qTok), qSig=sig(qTok);
  const scored=[];
  for(const b of BOOKS){
    const [sc,hard]=scoreBook(b,qNorm,qTok,qBg,qHas,qSig);
    if(mode==='ocr'){ if(sc>0.12) scored.push([sc,b]); }
    else { if(hard) scored.push([sc,b]); }
  }
  scored.sort((x,y)=> y[0]-x[0] || x[1].w-y[1].w);
  return scored.slice(0,limit);
}

// ---- rendering ----
const resultsEl=document.getElementById('results');
function cardHTML(b, best){
  const lvl = (b.l==='Phonics'||isNaN(parseInt(b.l))) ? b.l : 'Lv '+b.l;
  return `<div class="card${best?' best':''}" data-id="${b.id}">
    <div class="main">
      <div class="title">${escapeHtml(b.t)}</div>
      <div class="meta"><span class="lvl">${escapeHtml(lvl)}</span></div>
    </div>
    <div class="words"><div class="n">${b.w.toLocaleString()}</div><div class="u">語 WORDS</div></div>
  </div>`;
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function showResults(list, label){
  if(!list.length){ resultsEl.innerHTML='<div class="empty">見つかりませんでした。<br>スペルを変えて検索するか、もう一度撮ってみてね。</div>'; return; }
  let html = label?`<div class="section-label">${label}</div>`:'';
  list.forEach(([sc,b],i)=> html+=cardHTML(b, i===0&&!!label));
  resultsEl.innerHTML=html;
  resultsEl.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>openDetail(parseInt(c.dataset.id,10)));
  });
}

// ---- detail popup ----
function openDetail(id){
  const b=BOOKS[id]; if(!b) return;
  document.getElementById('dTitle').textContent=b.t;
  document.getElementById('dWords').textContent=b.w.toLocaleString();
  const lvl=(b.l==='Phonics'||isNaN(parseInt(b.l)))?b.l:'レベル '+b.l;
  document.getElementById('dLevel').textContent=lvl;
  document.getElementById('detail').classList.add('show');
}
document.getElementById('dClose').onclick=()=>document.getElementById('detail').classList.remove('show');
document.getElementById('detail').onclick=e=>{ if(e.target.id==='detail') e.target.classList.remove('show'); };

// ---- search ----
const searchEl=document.getElementById('search');
let tSearch;
searchEl.addEventListener('input',()=>{
  clearTimeout(tSearch);
  tSearch=setTimeout(()=>{
    const q=searchEl.value.trim();
    document.getElementById('ocrRead').style.display='none';
    if(q.length===0){ resultsEl.innerHTML=''; return; }
    showResults(rank(q,60,'search'), null);
  },120);
});

// ---- camera + OCR ----
const photoBtn=document.getElementById('photoBtn');
const fileIn=document.getElementById('fileIn');
const statusEl=document.getElementById('status');
const statusText=document.getElementById('statusText');
const barEl=document.getElementById('bar');
const ocrReadEl=document.getElementById('ocrRead');

photoBtn.onclick=()=>fileIn.click();
fileIn.onchange=async()=>{
  const file=fileIn.files[0]; if(!file) return;
  fileIn.value='';
  resultsEl.innerHTML=''; ocrReadEl.style.display='none';
  searchEl.value='';
  statusEl.classList.add('show'); statusText.textContent='画像を準備中...'; barEl.style.width='5%';
  try{
    const img=await loadImage(file);
    const canvasUrl=preprocess(img);
    statusText.textContent='表紙の文字を読み取り中...';
    const {data}=await Tesseract.recognize(canvasUrl,'eng',{
      logger:m=>{ if(m.status==='recognizing text'){ barEl.style.width=(20+m.progress*75)+'%'; } }
    });
    barEl.style.width='100%';
    const text=(data.text||'').trim();
    statusEl.classList.remove('show');
    handleOcrText(text);
  }catch(err){
    statusEl.classList.remove('show');
    resultsEl.innerHTML='<div class="empty">読み取りに失敗しました。明るい場所でタイトルが大きく写るように撮ってみてね。</div>';
    console.error(err);
  }
};

function loadImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img); img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}
// downscale + grayscale + contrast for better OCR
function preprocess(img){
  const canvas=document.getElementById('canvas');
  const maxW=1280;
  let w=img.width, h=img.height;
  if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
  canvas.width=w; canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,0,0,w,h);
  const id=ctx.getImageData(0,0,w,h); const d=id.data;
  const contrast=1.35, intercept=128*(1-contrast);
  for(let i=0;i<d.length;i+=4){
    let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    g=g*contrast+intercept;
    g=g<0?0:g>255?255:g;
    d[i]=d[i+1]=d[i+2]=g;
  }
  ctx.putImageData(id,0,0);
  return canvas.toDataURL('image/png');
}

function handleOcrText(text){
  const clean=text.replace(/\s+/g,' ').trim();
  ocrReadEl.style.display='block';
  ocrReadEl.innerHTML = clean ? `読み取った文字: <b>${escapeHtml(clean.slice(0,120))}</b>` : '文字を読み取れませんでした。';
  if(!clean){ showResults([],null); return; }
  const candidates=rank(clean,6,'ocr');
  showResults(candidates, 'この本かな? タップして確認 👇');
}
</script>
